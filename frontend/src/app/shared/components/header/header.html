<div class="flex flex-col-reverse justify-between gap-6 md:flex-row md:items-center bg-white/80 backdrop-blur-md p-4 rounded-xl shadow-sm border border-gray-100">
  <button (click)="toggleSidebar()" 
    class="p-2 rounded-lg text-[#242e4c] hover:bg-gray-100 xl:hidden active:scale-90 transition-all" 
    type="button">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>
  <div class="capitalize">
    <nav aria-label="breadcrumb" class="w-max">
      <ol class="flex flex-wrap items-center w-full bg-transparent p-0 transition-all">
        <li class="flex items-center antialiased font-sans text-sm font-normal leading-normal cursor-pointer transition-colors duration-300 text-gray-500 hover:text-[#fe654b]">
          <a href="#">
            <p class="block antialiased font-sans text-sm leading-normal font-normal opacity-70 transition-all hover:opacity-100">dashboard</p>
          </a>
          <span class="text-gray-400 text-sm antialiased font-sans font-normal leading-normal mx-2">/</span>
        </li>
        <li class="flex items-center antialiased font-sans text-sm font-normal leading-normal text-[#242e4c]">
          <p class="block antialiased font-sans text-sm leading-normal font-semibold">home</p>
        </li>
      </ol>
    </nav>
    <h6 class="block antialiased tracking-normal font-sans text-xl font-bold leading-relaxed text-[#242e4c]">Home</h6>
  </div>

  <div class="flex items-center gap-4">
  <div class="flex items-center gap-1 border-r border-gray-200 pr-2">
    <button class="p-2 rounded-lg text-gray-500 hover:text-[#fe654b] transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-5 w-5">
        <path fill-rule="evenodd" d="M5.25 9a6.75 6.75 0 0113.5 0v.75c0 2.123.8 4.057 2.118 5.52a.75.75 0 01-.297 1.206c-1.544.57-3.16.99-4.831 1.243a3.75 3.75 0 11-7.48 0 24.585 24.585 0 01-4.831-1.244.75.75 0 01-.298-1.205A8.217 8.217 0 005.25 9.75V9zm4.502 8.9a2.25 2.25 0 104.496 0 25.057 25.057 0 01-4.496 0z" clip-rule="evenodd"></path>
      </svg>
    </button>
  </div>

  <div class="flex items-center gap-3">
    <div class="hidden text-right md:block">
      <p class="text-sm font-bold text-[#242e4c] leading-none">{{username()}}</p>
      @if(roleTitle()){
      <p class="text-[10px] font-medium text-[#fe654b] uppercase tracking-tighter">{{roleTitle()}}</p>
      }
    </div>

    <div class="relative group cursor-pointer">
      <div class="w-10 h-10 rounded-full border-2 border-[#fe654b] p-0.5 transition-transform group-hover:scale-105">
        <img 
          src="https://ui-avatars.com/api/?name=Juan+Perez&background=242e4c&color=fff" 
          alt="User Avatar" 
          class="w-full h-full rounded-full object-cover"
        />
      </div>
      <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
    </div>

    <button (click)="logout()" 
      class="flex items-center gap-2 ml-2 px-3 py-2 rounded-lg text-gray-600 hover:bg-red-50 hover:text-red-600 border border-transparent hover:border-red-100 transition-all active:scale-95 group" 
      type="button">
      <span class="text-sm font-bold font-sans">Cerrar Sesión</span>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 transition-transform group-hover:translate-x-1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
      </svg>
    </button>
  </div>
</div>
