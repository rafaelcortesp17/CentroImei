services:
  # 1. Base de Datos (PostgreSQL)
  db:
    image: postgres:18-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: centroimei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  # 2. Backend (Spring Boot)
  backend:
    build: ./backend/imei # Ruta a la carpeta del back
    container_name: spring-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # IMPORTANTE: Aquí usamos 'db' (el nombre del servicio) en vez de localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/centroimei
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  # 3. Frontend (Angular + Nginx)
  frontend:
    build: ./frontend # Ruta a la carpeta del front
    container_name: angular-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"